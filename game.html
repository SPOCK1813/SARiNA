<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARiNA GAME</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

.game{
  position:relative;
  width:100vw;
  height:100vh;
}

.player{
  position:absolute;
  left:80px;
  bottom:100px;
  width:80px;
  z-index:10;
}

.player img{
  width:100%;
  display:block;
}

.obstacle{
  position:absolute;
  right:-60px;
  bottom:100px;
  width:60px;
  height:auto;
  object-fit:contain;
  animation:move 2s linear infinite;
}

.ground{
  position:absolute;
  bottom:80px;
  width:100%;
  height:2px;
  background:#00ff88;
}

.score{
  position:absolute;
  top:40px;
  width:100%;
  text-align:center;
  font-size:48px;
  color:#00ff88;
  z-index:20;
}

@keyframes move{
  from{ right:-60px; }
  to{ right:100vw; }
}

.jump{
  animation:jump 0.6s ease;
}

@keyframes jump{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-150px); }
  100%{ transform:translateY(0); }
}
</style>
</head>

<body>

<div class="game">

  <div class="score" id="score">10</div>

  <div class="player" id="player">
    <img src="sarina-pixel.png" alt="player">
  </div>

  <img src="obstacle.png" class="obstacle" id="obstacle">

  <div class="ground"></div>

</div>

<script>
const player = document.getElementById("player");
const obstacle = document.getElementById("obstacle");
const score = document.getElementById("score");

let jumping = false;
let time = 10;
let gameOver = false;

function jump(){
  if(jumping || gameOver) return;
  jumping = true;
  player.classList.add("jump");

  setTimeout(()=>{
    player.classList.remove("jump");
    jumping = false;
  },600);
}

window.addEventListener("click", jump);
window.addEventListener("touchstart", jump, { passive:true });

const timer = setInterval(()=>{
  if(gameOver) return;

  time--;
  score.textContent = time;

  if(time <= 0){
    gameOver = true;
    score.textContent = "CLEAR";
    obstacle.style.animation = "none";
  }
},1000);

function checkHit(){
  if(gameOver) return;

  const playerRect = player.getBoundingClientRect();
  const obstacleRect = obstacle.getBoundingClientRect();

  if(
    playerRect.right > obstacleRect.left &&
    playerRect.left < obstacleRect.right &&
    playerRect.bottom > obstacleRect.top &&
    playerRect.top < obstacleRect.bottom
  ){
    gameOver = true;
    score.textContent = "GAME OVER";
    obstacle.style.animation = "none";
  }
}

setInterval(checkHit, 10);
</script>

</body>
</html>
