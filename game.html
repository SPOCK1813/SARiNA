<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SARiNA GREEN SWORD</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #8fffc1;
      touch-action: manipulation;
    }

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at center 68%, rgba(0,255,136,0.12) 0%, rgba(0,0,0,0) 28%),
        linear-gradient(to bottom, #000 0%, #000 100%);
    }

    .title {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 20px);
      width: 100%;
      text-align: center;
      letter-spacing: 4px;
      font-size: 16px;
      color: #baffdc;
      text-shadow: 0 0 10px rgba(0,255,136,0.25);
      z-index: 30;
    }

    .score {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 54px);
      width: 100%;
      text-align: center;
      font-size: 44px;
      font-weight: 900;
      color: #66ff9d;
      text-shadow:
        0 0 10px rgba(0,255,136,0.95),
        0 0 22px rgba(0,255,136,0.7),
        0 0 40px rgba(0,255,136,0.35);
      z-index: 30;
    }

    .hint {
      position: absolute;
      bottom: 132px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(186,255,220,0.82);
      z-index: 30;
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 74px;
      height: 18px;
      border-top: 2px solid rgba(0,255,136,0.85);
      background:
        repeating-linear-gradient(
          90deg,
          rgba(0,255,136,0.18) 0 16px,
          rgba(0,0,0,0) 16px 32px
        );
      box-shadow:
        0 0 12px rgba(0,255,136,0.18),
        0 0 24px rgba(0,255,136,0.10);
      animation: groundMove 0.7s linear infinite;
      z-index: 5;
    }

    .player-wrap {
      position: absolute;
      left: 62px;
      bottom: 74px;
      width: 96px;
      height: 108px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }

    .player {
      width: 84px;
      height: 84px;
      object-fit: contain;
      image-rendering: pixelated;
      filter:
        drop-shadow(0 0 10px rgba(0,255,136,0.14))
        drop-shadow(0 0 22px rgba(0,255,136,0.10));
      transition: transform 0.12s ease;
      display: block;
    }

    .player.attack {
      transform: scale(1.06);
    }

    .sword {
      position: absolute;
      left: 156px;
      bottom: 150px;
      width: 12px;
      height: 104px;
      background: linear-gradient(
        to bottom,
        #ffffff 0%,
        #ecfff6 16%,
        #a9ffd6 40%,
        #00ff88 76%,
        rgba(0,255,136,0.28) 100%
      );
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 999px;
      box-shadow:
        0 0 14px rgba(0,255,136,1),
        0 0 28px rgba(0,255,136,0.72),
        0 0 56px rgba(0,255,136,0.35);
      transform-origin: 50% 100%;
      opacity: 0;
      z-index: 40;
      pointer-events: none;
    }

    .sword::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      width: 54px;
      height: 10px;
      border-radius: 999px;
      background: #d7ffe9;
      box-shadow:
        0 0 8px rgba(0,255,136,0.9),
        0 0 18px rgba(0,255,136,0.45);
    }

    .enemy {
      position: absolute;
      bottom: 92px;
      width: 54px;
      height: 76px;
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 12;
      filter:
        drop-shadow(0 0 10px rgba(0,255,136,0.35))
        drop-shadow(0 0 18px rgba(0,255,136,0.18));
    }

    .enemy.hit {
      animation: enemyBreak 0.22s ease-out forwards;
    }
        .flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.10);
      opacity: 0;
      pointer-events: none;
      z-index: 35;
    }

    .flash.active {
      animation: flashFx 0.16s ease-out;
    }

    .slash-text {
      position: absolute;
      left: 50%;
      top: 36%;
      transform: translateX(-50%) scale(0.8);
      opacity: 0;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #eafff5;
      text-shadow:
        0 0 8px rgba(0,255,136,0.95),
        0 0 18px rgba(0,255,136,0.65);
      z-index: 35;
      pointer-events: none;
    }

    .slash-text.show {
      animation: slashTextFx 0.30s ease-out;
    }

    .game-over {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.82);
      z-index: 50;
      padding: 22px;
      text-align: center;
    }

    .result-image {
      width: min(78vw, 360px);
      max-height: 34vh;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 18px;
      border: 1px solid rgba(0,255,136,0.35);
      box-shadow:
        0 0 20px rgba(0,255,136,0.35),
        0 0 42px rgba(0,255,136,0.14);
      display: none;
    }

    .game-over.fail .result-image {
      border-color: rgba(255,80,80,0.55);
      box-shadow:
        0 0 20px rgba(255,60,60,0.35),
        0 0 42px rgba(255,60,60,0.14);
    }

    .game-over h2 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 4px;
      color: #effff5;
      text-shadow:
        0 0 8px rgba(0,255,136,0.95),
        0 0 18px rgba(0,255,136,0.65);
    }

    .game-over.fail h2 {
      color: #ff7777;
      text-shadow:
        0 0 8px rgba(255,80,80,0.95),
        0 0 18px rgba(255,80,80,0.65);
    }

    .game-over p {
      margin: 12px 0 0;
      font-size: 17px;
      color: #b8ffd9;
      line-height: 1.6;
    }

    .result-message {
      color: #eafff5;
      font-weight: 700;
    }

    .retry {
      margin-top: 16px;
      padding: 14px 22px;
      border: 2px solid #00ff88;
      background: rgba(0,255,136,0.08);
      color: #effff5;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      min-width: 220px;
    }

    .game-over.fail .retry {
      border-color: #ff7777;
    }
        @keyframes groundMove {
      from { background-position-x: 0; }
      to { background-position-x: -32px; }
    }

    @keyframes enemyBreak {
      0% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.35) rotate(18deg);
      }
    }

    @keyframes flashFx {
      0% { opacity: 0; }
      40% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes slashTextFx {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.78);
      }
      30% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) scale(1.08);
      }
    }
  </style>
</head>

<body>

<div class="game" id="game">

  <div class="title">
    SARiNA GREEN SWORD
  </div>

  <div class="score" id="score">
    0
  </div>

  <div class="hint">
    TAP TO SLASH
  </div>

  <div class="player-wrap">
    <img
      src="sarina-stand.PNG"
      class="player"
      id="player"
      alt="player">
  </div>

  <!-- 剣 -->
  <div class="sword" id="sword"></div>

  <!-- 敵画像 -->
  <img
    src="enemy.png"
    id="enemy"
    class="enemy"
    alt="enemy">

  <div class="ground"></div>

  <div class="flash" id="flash"></div>

  <div
    class="slash-text"
    id="slashText">
    SLASH!
  </div>

  <!-- リザルト画面 -->
  <div class="game-over" id="gameOver">

    <img
      id="resultImage"
      class="result-image"
      src=""
      alt="">

    <h2 id="resultTitle">
      GAME OVER
    </h2>

    <p
      class="result-message"
      id="resultMessage">
    </p>

    <p id="finalScore">
      0体撃破
    </p>

    <button
      class="retry"
      id="retryBtn">
      もう一度挑戦
    </button>

    <button
      class="retry"
      onclick="location.href='index.html#contents'">
      公開ページへ戻る
    </button>

  </div>

</div>

<audio
  id="bgm"
  src="bgm.mp3"
  loop
  preload="auto">
</audio>

<script>

const player = document.getElementById("player");
const sword = document.getElementById("sword");
const enemy = document.getElementById("enemy");

const score = document.getElementById("score");

const flash = document.getElementById("flash");
const slashText = document.getElementById("slashText");

const gameOver = document.getElementById("gameOver");

const resultImage =
document.getElementById("resultImage");

const resultTitle =
document.getElementById("resultTitle");

const resultMessage =
document.getElementById("resultMessage");

const finalScore =
document.getElementById("finalScore");

const retryBtn =
document.getElementById("retryBtn");

const bgm =
document.getElementById("bgm");

const PLAYER_STAND =
"sarina-stand.PNG";

const PLAYER_ATTACK =
"sarina-attack.PNG";

const PLAYER_DAMAGE =
"sarina-damage.png";

/* 成功画像 */
const CLEAR_IMAGE =
"success.jpg";

/* 失敗画像 */
const FAIL_IMAGE =
"sarina-funny.png";

/* 敵画像 */
const ENEMY_IMAGE =
"enemy.png";

let killCount = 0;
let attacking = false;
let gameEnded = false;
let canAttack = false;
let bgmStarted = false;

let enemyX =
window.innerWidth + 180;

const enemySpeed = 4.8;
  function enableAttackSoon() {
  canAttack = false;

  setTimeout(() => {
    canAttack = true;
  }, 700);
}

function resetEnemy() {

  enemyX =
    window.innerWidth +
    Math.random() * 180 +
    80;

  enemy.src = ENEMY_IMAGE;

  enemy.classList.remove("hit");
  enemy.style.display = "block";

  drawEnemy();
}

function drawEnemy() {
  enemy.style.left = enemyX + "px";
}

function updateEnemy() {

  if (gameEnded) return;

  enemyX -= enemySpeed;

  drawEnemy();

  if (enemyX < -80) {
    resetEnemy();
  }

  checkCollision();

  requestAnimationFrame(updateEnemy);
}

function showSword() {

  sword.style.opacity = "1";

  sword.style.transform =
    "rotate(-170deg) scale(0.3)";

  setTimeout(() => {

    sword.style.transform =
      "rotate(-78deg) scale(1)";

  }, 10);

  setTimeout(() => {

    sword.style.transform =
      "rotate(8deg) scale(1)";

  }, 120);

  setTimeout(() => {

    sword.style.opacity = "0";

    sword.style.transform =
      "rotate(-170deg) scale(0.3)";

  }, 240);

}

function attack() {

  if (
    !canAttack ||
    attacking ||
    gameEnded
  ) return;

  attacking = true;

  player.classList.add("attack");
  player.src = PLAYER_ATTACK;

  showSword();

  if (navigator.vibrate) {
    navigator.vibrate(18);
  }

  const slashLeft = 156;
  const slashRight = 240;

  const enemyLeft = enemyX;
  const enemyRight = enemyX + 54;

  const hit =
    enemyRight > slashLeft &&
    enemyLeft < slashRight;

  if (hit) {

    killCount++;

    score.textContent = killCount;

    enemy.classList.add("hit");

    flash.classList.remove("active");
    slashText.classList.remove("show");

    void flash.offsetWidth;
    void slashText.offsetWidth;

    flash.classList.add("active");
    slashText.classList.add("show");

    if (killCount >= 10) {

      gameEnded = true;

      setTimeout(() => {

        showResult(
          "CLEAR!",
          "10体撃破成功",
          CLEAR_IMAGE,
          "🎉 HAPPY BIRTHDAY SARiNA 🎉",
          false
        );

      }, 180);

      return;
    }

    setTimeout(() => {
      resetEnemy();
    }, 180);

  }

  setTimeout(() => {

    player.classList.remove("attack");

    player.src = PLAYER_STAND;

    attacking = false;

  }, 260);

}
  function checkCollision() {

  if (gameEnded) return;
  if (enemy.classList.contains("hit")) return;
  if (enemyX > window.innerWidth) return;

  const playerLeft = 62;
  const playerRight = 146;

  const enemyLeft = enemyX;
  const enemyRight = enemyX + 54;

  if (
    enemyRight > playerLeft + 12 &&
    enemyLeft < playerRight - 8
  ) {
    endGame();
  }
}

function endGame() {

  gameEnded = true;

  player.src = PLAYER_DAMAGE;

  setTimeout(() => {

    showResult(
      "GAME OVER",
      killCount + "体撃破",
      FAIL_IMAGE,
      "くやしい…もう一回守ろう！",
      true
    );

  }, 500);
}

function showResult(
  title,
  scoreMessage,
  imageSrc,
  messageText,
  isFail
) {

  resultTitle.textContent = title;
  finalScore.textContent = scoreMessage;
  resultMessage.textContent = messageText;

  resultImage.src = imageSrc;
  resultImage.style.display = "block";

  gameOver.classList.toggle("fail", isFail);
  gameOver.style.display = "flex";
}

function restartGame() {

  killCount = 0;
  score.textContent = "0";

  gameEnded = false;
  attacking = false;

  gameOver.style.display = "none";
  gameOver.classList.remove("fail");

  resultImage.src = "";
  resultImage.style.display = "none";

  player.src = PLAYER_STAND;

  sword.style.opacity = "0";
  sword.style.transform =
    "rotate(-170deg) scale(0.3)";

  enableAttackSoon();
  resetEnemy();

  requestAnimationFrame(updateEnemy);
}
  window.addEventListener("pointerdown", () => {

  attack();

  if (!bgmStarted) {

    bgm.volume = 0.4;

    bgm.play().catch(() => {});

    bgmStarted = true;
  }
});

retryBtn.addEventListener("pointerdown", (e) => {

  e.stopPropagation();

  restartGame();
});

enableAttackSoon();

resetEnemy();

requestAnimationFrame(updateEnemy);

</script>
</body>
</html>
