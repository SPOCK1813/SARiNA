<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARiNA GAME</title>

<style>
* { box-sizing: border-box; }

body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

.game{
  position:relative;
  width:100vw;
  height:100vh;
  background:#000;
}

/* 上の文字 */
.title{
  position:absolute;
  top:calc(env(safe-area-inset-top, 0px) + 22px);
  width:100%;
  text-align:center;
  font-size:18px;
  letter-spacing:6px;
  color:#9dffca;
  z-index:20;
}

.score{
  position:absolute;
  top:calc(env(safe-area-inset-top, 0px) + 58px);
  width:100%;
  text-align:center;
  font-size:56px;
  font-weight:bold;
  color:#00ff88;
  text-shadow:0 0 12px #00ff88;
  z-index:20;
}

/* キャラ */
.player{
  position:absolute;
  left:80px;
  bottom:82px;
  width:80px;
  z-index:10;
}

.player img{
  width:100%;
  display:block;
  image-rendering:pixelated;
}

.jump{
  animation:jump 0.7s ease;
}

@keyframes jump{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-170px); }
  100%{ transform:translateY(0); }
}

/* 障害物 */
.obstacle{
  position:absolute;
  right:-60px;
  bottom:82px;
  width:42px;
  height:42px;
  object-fit:contain;
  display:block;
  image-rendering:pixelated;
  animation:move 2.2s linear infinite;
  z-index:9;
}

@keyframes move{
  from{ right:-60px; }
  to{ right:100vw; }
}

/* 地面 */
.ground{
  position:absolute;
  bottom:80px;
  width:100%;
  height:2px;
  background:#00ff88;
  box-shadow:0 0 8px #00ff88;
}
</style>
</head>

<body>

<div class="game">
  <div class="title">SARiNA PIXEL GAME</div>
  <div class="score" id="score">10</div>

  <div class="player" id="player">
    <img src="sarina-pixel.png" alt="player">
  </div>

  <img src="obstacle.png" class="obstacle" id="obstacle" alt="obstacle">

  <div class="ground"></div>
</div>

<script>
const player = document.getElementById("player");
const obstacle = document.getElementById("obstacle");
const score = document.getElementById("score");

let jumping = false;
let time = 10;
let gameOver = false;

function jump(){
  if(jumping || gameOver) return;
  jumping = true;
  player.classList.add("jump");

  setTimeout(()=>{
    player.classList.remove("jump");
    jumping = false;
  },700);
}

window.addEventListener("click", jump);
window.addEventListener("touchstart", jump, { passive:true });

const timer = setInterval(()=>{
  if(gameOver) return;

  time--;
  score.textContent = time;

  if(time <= 0){
    gameOver = true;
    score.textContent = "CLEAR";
    obstacle.style.animation = "none";
  }
},1000);

function checkHit(){
  if(gameOver) return;

  const p = player.getBoundingClientRect();
  const o = obstacle.getBoundingClientRect();

  /* 当たり判定を少し甘くする */
  const hit =
    p.right - 12 > o.left &&
    p.left + 12 < o.right &&
    p.bottom - 8 > o.top &&
    p.top + 8 < o.bottom;

  if(hit){
    gameOver = true;
    score.textContent = "GAME OVER";
    obstacle.style.animation = "none";
  }
}

setInterval(checkHit, 20);
</script>

</body>
</html>
