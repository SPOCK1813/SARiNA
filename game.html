<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SARiNA SWORD GAME</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #8fffc1;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at center 68%, rgba(0,255,136,0.12) 0%, rgba(0,0,0,0) 28%),
        linear-gradient(to bottom, #000 0%, #000 100%);
    }

    .title {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 22px);
      width: 100%;
      text-align: center;
      letter-spacing: 5px;
      font-size: 16px;
      color: #baffdc;
      text-shadow: 0 0 10px rgba(0,255,136,0.25);
      z-index: 30;
    }

    .score {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 56px);
      width: 100%;
      text-align: center;
      font-size: 46px;
      font-weight: 900;
      color: #66ff9d;
      text-shadow:
        0 0 10px rgba(0,255,136,0.95),
        0 0 22px rgba(0,255,136,0.7),
        0 0 40px rgba(0,255,136,0.35);
      z-index: 30;
    }

    .hint {
      position: absolute;
      bottom: 132px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(186,255,220,0.82);
      z-index: 30;
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 74px;
      height: 18px;
      border-top: 2px solid rgba(0,255,136,0.85);
      background:
        repeating-linear-gradient(
          90deg,
          rgba(0,255,136,0.18) 0 16px,
          rgba(0,0,0,0) 16px 32px
        );
      box-shadow:
        0 0 12px rgba(0,255,136,0.18),
        0 0 24px rgba(0,255,136,0.10);
      animation: groundMove 0.7s linear infinite;
      z-index: 5;
    }

    .player-lane {
      position: absolute;
      left: 62px;
      bottom: 74px;
      width: 96px;
      height: 108px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }

    .player {
      width: 84px;
      height: 84px;
      display: block;
      object-fit: contain;
      image-rendering: pixelated;
      filter:
        drop-shadow(0 0 10px rgba(0,255,136,0.14))
        drop-shadow(0 0 22px rgba(0,255,136,0.10));
    }

    .player.attack {
      animation: playerPulse 0.18s ease-out;
    }

    .sword {
  position: absolute;
  left: 92px;
  bottom: 118px;
  width: 26px;
  height: 140px;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.95),
    #d9fff0 18%,
    #00ff88 58%,
    rgba(0,255,136,0.25)
  );
  border-radius: 999px;
  box-shadow:
    0 0 12px rgba(0,255,136,0.95),
    0 0 28px rgba(0,255,136,0.65),
    0 0 48px rgba(0,255,136,0.28);
  transform-origin: center top;
  transform: rotate(-95deg) scaleY(0.15);
  opacity: 0;
  z-index: 25;
  pointer-events: none;
    }
    
   .sword.active {
  animation: slashDown 0.28s ease-out forwards;
   }
　　　@keyframes slashDown {
  0% {
    opacity: 0;
    transform: rotate(-95deg) scaleY(0.15);
  }
  25% {
    opacity: 1;
    transform: rotate(-35deg) scaleY(1);
  }
  100% {
    opacity: 0;
    transform: rotate(18deg) scaleY(1.05);
  }
   }
    
    .enemy {
      position: absolute;
      right: -74px;
      bottom: 92px;
      width: 48px;
      height: 76px;
      border: 2px solid rgba(0,255,136,0.75);
      border-radius: 14px;
      background: linear-gradient(to bottom, rgba(0,255,136,0.08), rgba(0,255,136,0.18));
      box-shadow:
        0 0 16px rgba(0,255,136,0.16),
        inset 0 0 14px rgba(0,255,136,0.08);
      z-index: 12;
    }

    .enemy.hit {
      animation: enemyBreak 0.28s ease-out forwards;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.10);
      opacity: 0;
      pointer-events: none;
      z-index: 40;
    }

    .flash.active {
      animation: flashFx 0.18s ease-out;
    }

    .slash-text {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translateX(-50%) scale(0.8);
      opacity: 0;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #eafff5;
      text-shadow:
        0 0 8px rgba(0,255,136,0.95),
        0 0 18px rgba(0,255,136,0.65);
      z-index: 35;
      pointer-events: none;
    }

    .slash-text.show {
      animation: slashTextFx 0.34s ease-out;
    }

    .game-over {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.48);
      z-index: 50;
      padding: 24px;
      text-align: center;
    }

    .game-over h2 {
      margin: 0;
      font-size: 44px;
      letter-spacing: 4px;
      color: #effff5;
      text-shadow:
        0 0 8px rgba(0,255,136,0.95),
        0 0 18px rgba(0,255,136,0.65);
    }

    .game-over p {
      margin: 16px 0 0;
      font-size: 18px;
      color: #b8ffd9;
    }

    .retry {
      margin-top: 22px;
      padding: 14px 22px;
      border: 2px solid #00ff88;
      background: rgba(0,255,136,0.08);
      color: #effff5;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    @keyframes groundMove {
      from { background-position-x: 0; }
      to   { background-position-x: -32px; }
    }

    @keyframes slash {
      0% {
        opacity: 0;
        transform: scaleX(0.1) skewX(-18deg);
      }
      30% {
        opacity: 1;
        transform: scaleX(1.05) skewX(-18deg);
      }
      100% {
        opacity: 0;
        transform: scaleX(1.15) skewX(-18deg);
      }
    }

    @keyframes playerPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @keyframes enemyBreak {
      0% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.35) rotate(18deg);
      }
    }

    @keyframes flashFx {
      0% { opacity: 0; }
      40% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes slashTextFx {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.78);
      }
      30% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div class="game" id="game">
    <div class="title">SARiNA GREEN SWORD</div>
    <div class="score" id="score">0</div>
    <div class="hint">TAP TO SLASH</div>

    <div class="player-lane">
      <img src="sarina-pixel.png" alt="player" class="player" id="player" />
    </div>

    <div class="sword" id="sword"></div>

    <div class="enemy" id="enemy"></div>

    <div class="ground"></div>

    <div class="flash" id="flash"></div>
    <div class="slash-text" id="slashText">SLASH!</div>

    <div class="game-over" id="gameOver">
      <h2>GAME OVER</h2>
      <p id="finalScore">0体撃破</p>
      <button class="retry" id="retryBtn">RETRY</button>
    </div>
  </div>

  <script>
    const player = document.getElementById("player");
    const sword = document.getElementById("sword");
    const enemy = document.getElementById("enemy");
    const score = document.getElementById("score");
    const flash = document.getElementById("flash");
    const slashText = document.getElementById("slashText");
    const gameOver = document.getElementById("gameOver");
    const finalScore = document.getElementById("finalScore");
    const retryBtn = document.getElementById("retryBtn");

    let killCount = 0;
    let attacking = false;
    let gameEnded = false;

    let enemyX = window.innerWidth + 80;
    let enemySpeed = 6.5;

    function resetEnemy() {
      enemyX = window.innerWidth + Math.random() * 180 + 40;
      enemy.classList.remove("hit");
      enemy.style.display = "block";
    }

    function updateEnemy() {
      if (gameEnded) return;

      enemyX -= enemySpeed;
      enemy.style.right = (window.innerWidth - enemyX) + "px";

      if (enemyX < -100) {
        gameEnded = true;
        endGame();
        return;
      }

      checkCollision();
      requestAnimationFrame(updateEnemy);
    }

    function attack() {
      if (attacking || gameEnded) return;
      attacking = true;

      player.classList.add("attack");
      sword.classList.remove("active");
      void sword.offsetWidth;
      sword.classList.add("active");

      if (navigator.vibrate) navigator.vibrate(18);

      const slashLeft = 130;
      const slashRight = slashLeft + 120;
      const enemyLeft = enemyX - 48;
      const enemyRight = enemyX;

      const inRange = enemyRight > slashLeft && enemyLeft < slashRight;

      if (inRange) {
        killCount += 1;
        score.textContent = killCount;
        enemy.classList.add("hit");
        flash.classList.remove("active");
        slashText.classList.remove("show");
        void flash.offsetWidth;
        void slashText.offsetWidth;
        flash.classList.add("active");
        slashText.classList.add("show");

        setTimeout(() => {
          resetEnemy();
        }, 180);
      }

      setTimeout(() => {
        player.classList.remove("attack");
        attacking = false;
      }, 220);
    }

    function checkCollision() {
      if (gameEnded) return;

      const playerZoneLeft = 62;
      const playerZoneRight = 62 + 84;

      const enemyLeft = enemyX - 48;
      const enemyRight = enemyX;

      if (enemyRight > playerZoneLeft + 16 && enemyLeft < playerZoneRight - 10) {
        gameEnded = true;
        endGame();
      }
    }

    function endGame() {
      finalScore.textContent = killCount + "体撃破";
      gameOver.style.display = "flex";
    }

    function restartGame() {
      killCount = 0;
      score.textContent = "0";
      gameEnded = false;
      attacking = false;
      gameOver.style.display = "none";
      resetEnemy();
      requestAnimationFrame(updateEnemy);
    }

    window.addEventListener("click", attack);
    window.addEventListener("touchstart", attack, { passive: true });
    retryBtn.addEventListener("click", restartGame);

    resetEnemy();
    requestAnimationFrame(updateEnemy);
  </script>
</body>
</html>
