<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SARiNA GREEN SWORD</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #8fffc1;
      touch-action: manipulation;
    }

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at center 68%, rgba(0,255,136,0.12) 0%, rgba(0,0,0,0) 28%),
        linear-gradient(to bottom, #000 0%, #000 100%);
    }

    .title {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 20px);
      width: 100%;
      text-align: center;
      letter-spacing: 4px;
      font-size: 16px;
      color: #baffdc;
      text-shadow: 0 0 10px rgba(0,255,136,0.25);
      z-index: 30;
    }

    .score {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 54px);
      width: 100%;
      text-align: center;
      font-size: 44px;
      font-weight: 900;
      color: #66ff9d;
      text-shadow:
        0 0 10px rgba(0,255,136,0.95),
        0 0 22px rgba(0,255,136,0.7),
        0 0 40px rgba(0,255,136,0.35);
      z-index: 30;
    }

    .hint {
      position: absolute;
      bottom: 132px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(186,255,220,0.82);
      z-index: 30;
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 74px;
      height: 18px;
      border-top: 2px solid rgba(0,255,136,0.85);
      background:
        repeating-linear-gradient(
          90deg,
          rgba(0,255,136,0.18) 0 16px,
          rgba(0,0,0,0) 16px 32px
        );
      box-shadow:
        0 0 12px rgba(0,255,136,0.18),
        0 0 24px rgba(0,255,136,0.10);
      animation: groundMove 0.7s linear infinite;
      z-index: 5;
    }

    .player-wrap {
      position: absolute;
      left: 62px;
      bottom: 74px;
      width: 96px;
      height: 108px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }

    .player {
      width: 84px;
      height: 84px;
      object-fit: contain;
      image-rendering: pixelated;
      filter:
        drop-shadow(0 0 10px rgba(0,255,136,0.14))
        drop-shadow(0 0 22px rgba(0,255,136,0.10));
      transition: transform 0.12s ease;
      display: block;
    }

    .player.attack {
      transform: scale(1.06);
    }

    .sword {
      position: absolute;
      left: 126px;
      bottom: 112px;
      width: 14px;
      height: 108px;
      background: linear-gradient(
        to bottom,
        #ffffff 0%,
        #ecfff6 16%,
        #a9ffd6 40%,
        #00ff88 76%,
        rgba(0,255,136,0.28) 100%
      );
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 999px;
      box-shadow:
        0 0 14px rgba(0,255,136,1),
        0 0 28px rgba(0,255,136,0.72),
        0 0 56px rgba(0,255,136,0.35);
      transform-origin: 50% 100%;
      transform: rotate(-65deg) scale(0.3);
      opacity: 0;
      z-index: 40;
      pointer-events: none;
    }

    .sword::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -12px;
      transform: translateX(-50%);
      width: 42px;
      height: 12px;
      border-radius: 999px;
      background: #d7ffe9;
      box-shadow:
        0 0 8px rgba(0,255,136,0.9),
        0 0 18px rgba(0,255,136,0.45);
    }

    .enemy {
      position: absolute;
      bottom: 92px;
      width: 48px;
      height: 76px;
      border: 2px solid rgba(0,255,136,0.75);
      border-radius: 14px;
      background: linear-gradient(to bottom, rgba(0,255,136,0.08), rgba(0,255,136,0.18));
      box-shadow:
        0 0 16px rgba(0,255,136,0.16),
        inset 0 0 14px rgba(0,255,136,0.08);
      z-index: 12;
    }

    .enemy.hit {
      animation: enemyBreak 0.22s ease-out forwards;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.10);
      opacity: 0;
      pointer-events: none;
      z-index: 35;
    }

    .flash.active {
      animation: flashFx 0.16s ease-out;
    }

    .slash-text {
      position: absolute;
      left: 50%;
      top: 36%;
      transform: translateX(-50%) scale(0.8);
      opacity: 0;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #eafff5;
      text-shadow:
        0 0 8px rgba(0,255,136,0.95),
        0 0 18px rgba(0,255,136,0.65);
      z-index: 35;
      pointer-events: none;
    }

    .slash-text.show {
      animation: slashTextFx 0.30s ease-out;
    }

    .game-over {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.48);
      z-index: 50;
      padding: 24px;
      text-align: center;
    }

    .game-over h2 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 4px;
      color: #effff5;
      text-shadow:
        0 0 8px rgba(0,255,136,0.95),
        0 0 18px rgba(0,255,136,0.65);
    }

    .game-over p {
      margin: 16px 0 0;
      font-size: 18px;
      color: #b8ffd9;
    }

    .retry {
      margin-top: 22px;
      padding: 14px 22px;
      border: 2px solid #00ff88;
      background: rgba(0,255,136,0.08);
      color: #effff5;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    @keyframes groundMove {
      from { background-position-x: 0; }
      to   { background-position-x: -32px; }
    }

    @keyframes enemyBreak {
      0% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.35) rotate(18deg);
      }
    }

    @keyframes flashFx {
      0% { opacity: 0; }
      40% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes slashTextFx {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.78);
      }
      30% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div class="game" id="game">
    <div class="title">SARiNA GREEN SWORD</div>
    <div class="score" id="score">0</div>
    <div class="hint">TAP TO SLASH</div>

    <div class="player-wrap">
      <img src="sarina-pixel.png" alt="player" class="player" id="player">
    </div>

    <div class="sword" id="sword"></div>
    <div class="enemy" id="enemy"></div>
    <div class="ground"></div>

    <div class="flash" id="flash"></div>
    <div class="slash-text" id="slashText">SLASH!</div>

    <div class="game-over" id="gameOver">
      <h2>GAME OVER</h2>
      <p id="finalScore">0体撃破</p>
      <button class="retry" id="retryBtn">RETRY</button>
    </div>
  </div>

  <script>
    const player = document.getElementById("player");
    const sword = document.getElementById("sword");
    const enemy = document.getElementById("enemy");
    const score = document.getElementById("score");
    const flash = document.getElementById("flash");
    const slashText = document.getElementById("slashText");
    const gameOver = document.getElementById("gameOver");
    const finalScore = document.getElementById("finalScore");
    const retryBtn = document.getElementById("retryBtn");

    let killCount = 0;
    let attacking = false;
    let gameEnded = false;
    let canAttack = false;

    let enemyX = window.innerWidth + 180;
    const enemySpeed = 4.8;

    function enableAttackSoon() {
      canAttack = false;
      setTimeout(() => {
        canAttack = true;
      }, 700);
    }

    function resetEnemy() {
      enemyX = window.innerWidth + Math.random() * 180 + 80;
      enemy.classList.remove("hit");
      enemy.style.display = "block";
      drawEnemy();
    }

    function drawEnemy() {
      enemy.style.left = enemyX + "px";
    }

    function updateEnemy() {
      if (gameEnded) return;

      enemyX -= enemySpeed;
      drawEnemy();

      if (enemyX < -80) {
        resetEnemy();
      }

      checkCollision();
      requestAnimationFrame(updateEnemy);
    }

    function showSword() {
  sword.style.opacity = "1";
  sword.style.transform = "rotate(-38deg) scale(0.92)";

  setTimeout(() => {
    sword.style.opacity = "0";
    sword.style.transform = "rotate(18deg) scale(0.96)";
  }, 110);

  setTimeout(() => {
    sword.style.transform = "rotate(-58deg) scale(0.25)";
  }, 220);
    }

    function attack() {
      if (!canAttack || attacking || gameEnded) return;

      attacking = true;
      player.classList.add("attack");
      showSword();

      if (navigator.vibrate) navigator.vibrate(18);

      const slashLeft = 110;
      const slashRight = 200;
      const enemyLeft = enemyX;
      const enemyRight = enemyX + 48;

      const inRange = enemyRight > slashLeft && enemyLeft < slashRight;

      if (inRange) {
        killCount += 1;
        score.textContent = killCount;

        enemy.classList.add("hit");

        flash.classList.remove("active");
        slashText.classList.remove("show");
        void flash.offsetWidth;
        void slashText.offsetWidth;
        flash.classList.add("active");
        slashText.classList.add("show");

        setTimeout(() => {
          resetEnemy();
        }, 180);
      }

      setTimeout(() => {
        player.classList.remove("attack");
        attacking = false;
      }, 260);
    }

    function checkCollision() {
      if (gameEnded) return;
      if (enemy.classList.contains("hit")) return;
      if (enemyX > window.innerWidth) return;

      const playerLeft = 62;
      const playerRight = 146;
      const enemyLeft = enemyX;
      const enemyRight = enemyX + 48;

      if (enemyRight > playerLeft + 12 && enemyLeft < playerRight - 8) {
        gameEnded = true;
        endGame();
      }
    }

    function endGame() {
      finalScore.textContent = killCount + "体撃破";
      gameOver.style.display = "flex";
    }

    function restartGame() {
      killCount = 0;
      score.textContent = "0";
      gameEnded = false;
      attacking = false;
      gameOver.style.display = "none";
      sword.style.opacity = "0";
      sword.style.transform = "rotate(-65deg) scale(0.3)";

      enableAttackSoon();
      resetEnemy();
      requestAnimationFrame(updateEnemy);
    }

    window.addEventListener("pointerdown", attack);
    retryBtn.addEventListener("pointerdown", (e) => {
      e.stopPropagation();
      restartGame();
    });

    enableAttackSoon();
    resetEnemy();
    requestAnimationFrame(updateEnemy);
  </script>
</body>
</html>
